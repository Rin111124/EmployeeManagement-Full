# Secrets are loaded from .env.docker when running Docker Compose with:
# docker compose --env-file .env.docker up -d --build
# Copy .env.docker.example to .env.docker, then fill in real values.
# NEVER commit .env.docker to version control.

services:
  mongodb:
    image: mongo:7
    # Do not publish MongoDB in production. Other containers reach it through
    # the internal Compose network by service name: mongodb.
    volumes:
      - mongo_data:/data/db
    env_file: .env.docker
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  admin-backend:
    build: ./admin-system/backend
    ports:
      - "5000:5000"
    env_file: .env.docker
    environment:
      - MONGODB_URI=mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongodb:27017/hrms?authSource=admin
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - NODE_ENV=${NODE_ENV:-production}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - COOKIE_SECURE=${COOKIE_SECURE}
      - COOKIE_SAME_SITE=${COOKIE_SAME_SITE}
      - SYNC_SECRET=${SYNC_SECRET}
      - CHATBOT_PROVIDER=${CHATBOT_PROVIDER:-gemini}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-pro}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-5.2}
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  admin-frontend:
    build:
      context: ./admin-system/frontend
      args:
        VITE_API_BASE: ${VITE_API_BASE:-http://localhost:5000/api/v1}
    ports:
      - "3000:80"
    depends_on:
      admin-backend:
        condition: service_healthy

  ai-service:
    build: ./attendance-system/ai-service
    ports:
      - "8000:8000"
    # Kiosk currently calls AI service directly. In production, restrict this
    # port with host firewall rules or place it behind a private reverse proxy.
    volumes:
      - ai_models:/root/.insightface/models
    env_file: .env.docker
    environment:
      - ENVIRONMENT=production
      - AI_API_KEY=${AI_API_KEY}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s

  attendance-service:
    build: ./attendance-system/attendance-service
    ports:
      - "5001:5001"
    env_file: .env.docker
    environment:
      - MONGODB_URI=mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongodb:27017/attendance?authSource=admin
      - ADMIN_URL=http://admin-backend:5000/api/v1
      - SYNC_SECRET=${SYNC_SECRET}
      - CORS_ORIGIN=${CORS_ORIGIN}
    depends_on:
      mongodb:
        condition: service_healthy
      admin-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5001/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  mongo_data:
  ai_models:
